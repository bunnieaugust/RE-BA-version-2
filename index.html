    <script>
      (function() {
        var f = window.fetch;
        if (f) {
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return f; },
              set: function(v) { f = v; }
            });
          } catch (e) {}
        }
      })();
    </script>
